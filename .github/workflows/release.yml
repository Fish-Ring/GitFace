name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2022
            arch: amd64
            goos: windows
            goext: ".exe"
            name: gitf-windows-amd64
          - os: windows-2022
            arch: arm64
            goos: windows
            goext: ".exe"
            name: gitf-windows-arm64
          - os: ubuntu-24.04
            arch: amd64
            goos: linux
            goext: ""
            name: gitf-linux-amd64
          - os: ubuntu-24.04
            arch: arm64
            goos: linux
            goext: ""
            name: gitf-linux-arm64
          - os: macos-14
            arch: amd64
            goos: darwin
            goext: ""
            name: gitf-macos-amd64
          - os: macos-14
            arch: arm64
            goos: darwin
            goext: ""
            name: gitf-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        shell: bash
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o gitf${{ matrix.goext }} .

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.name }}.tar.gz gitf

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path gitf.exe -DestinationPath ${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gitf-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.zip
            *.tar.gz
          generate_release_notes: true
