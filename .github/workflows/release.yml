name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        shell: bash
        run: |
          # map runner OS to GOOS
          case "${{ matrix.os }}" in
            windows*) goos="windows"; ext=".exe" ;;
            ubuntu*)  goos="linux";   ext="" ;;
            macos*)   goos="darwin";  ext="" ;;
          esac
          goarch="${{ matrix.arch }}"
          suffix="${goos}${ext}"
          [ "$goarch" = "arm64" ] && suffix="${goos}-arm64${ext}" || suffix="${goos}${ext}"
          out="gitf-${suffix}"
          CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -ldflags="-s -w" -o "$out" .

      - uses: actions/upload-artifact@v4
        with:
          name: gitf-${{ matrix.os }}-${{ matrix.arch }}
          path: gitf-*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: gitf-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: gitf-*
          generate_release_notes: true
